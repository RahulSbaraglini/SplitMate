<div class="login-page">

  <div class="brand-panel"></div>

  <div class="form-panel">

    <div class="brand-header">
      <h1 class="brand-name">SplitMate</h1>
    </div>

    <div class="login-form-block">
      <h2>Entrar</h2>
      <p class="form-sub">Acesse sua conta para continuar</p>

      <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>E-mail</mat-label>
          <input matInput formControlName="email" type="email" placeholder="seu@email.com">
          <mat-error *ngIf="loginForm.get('email')?.hasError('required')">
            E-mail é obrigatório
          </mat-error>
          <mat-error *ngIf="loginForm.get('email')?.hasError('email')">
            Digite um e-mail válido
          </mat-error>
        </mat-form-field>

        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Senha</mat-label>
          <input matInput formControlName="password" type="password">
          <mat-error *ngIf="loginForm.get('password')?.hasError('required')">
            Senha é obrigatória
          </mat-error>
          <mat-error *ngIf="loginForm.get('password')?.hasError('minlength')">
            Senha deve ter no mínimo 6 caracteres
          </mat-error>
        </mat-form-field>

        <p class="error-message" *ngIf="errorMessage">{{ errorMessage }}</p>

        <button
          mat-raised-button
          color="primary"
          type="submit"
          class="full-width"
          [disabled]="isLoading">
          <mat-spinner *ngIf="isLoading" diameter="20"></mat-spinner>
          <span *ngIf="!isLoading">Entrar</span>
        </button>

      </form>

      <p class="foot">Não tem conta? <a routerLink="/auth/register">Cadastre-se</a></p>
    </div>

  </div>

</div>
